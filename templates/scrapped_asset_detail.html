{{define "content"}}
<div id="app">
  <div class="flex items-center gap-3 mb-6">
    <a href="/scrapped" class="text-gray-400 hover:text-gray-600">&larr; 返回报废列表</a>
    <h1 class="text-2xl font-bold text-gray-900" id="assetTitle">加载中...</h1>
    <span id="assetStatusBadge" class="status-badge status-已报废">已报废</span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 space-y-6">
      <div class="card p-6">
        <h3 class="font-semibold text-gray-700 mb-4">基本信息</h3>
        <div id="basicFields" class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm"></div>
        <div id="assetNotesWrap" class="mt-4"></div>
      </div>

      <div class="card p-6">
        <h3 class="font-semibold text-gray-700 mb-4">报废信息</h3>
        <div id="scrapFields" class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm"></div>
      </div>
    </div>

    <div class="space-y-4">
      <div class="card p-5">
        <h3 class="font-semibold text-gray-700 mb-3">操作</h3>
        <button onclick="showRestore()" class="w-full py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm font-medium">🌱 复活此资产</button>
      </div>
      <div class="card p-5">
        <h3 class="font-semibold text-gray-700 mb-3">资产信息</h3>
        <div class="text-xs text-gray-400 space-y-1">
          <p>创建：<span id="infoCreated"></span></p>
          <p>报废时间：<span id="infoScrappedAt"></span></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 复活弹窗 -->
<div id="restoreModal" class="modal-overlay" onclick="if(event.target===this)closeRestoreModal()">
  <div class="modal-content" style="max-width:28rem">
    <h2 class="text-lg font-bold text-green-700 mb-4">🌱 复活资产</h2>
    <p class="text-sm text-gray-500 mb-4" id="restoreInfo"></p>
    <div class="mb-3">
      <label class="block text-xs text-gray-500 mb-1">复活原因</label>
      <select id="restoreReason" onchange="toggleRestoreReasonOther()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <option value="维修好了">维修好了</option>
        <option value="误报废">误报废</option>
        <option value="无需报废">无需报废</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div id="restoreReasonOtherWrap" class="hidden mb-3">
      <label class="block text-xs text-gray-500 mb-1">其他原因</label>
      <input type="text" id="restoreReasonOther" placeholder="请输入原因" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
    </div>
    <div class="mb-4">
      <label class="block text-xs text-gray-500 mb-1">备注（可选）</label>
      <textarea id="restoreNotes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
    </div>
    <div class="flex justify-end gap-3">
      <button onclick="closeRestoreModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm">取消</button>
      <button onclick="doRestore()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm font-medium">确认复活</button>
    </div>
  </div>
</div>

<script>
const assetId = parseInt(window.location.pathname.split('/').pop());
let asset = {};

function loadAsset() {
  fetch('/api/scrapped/'+assetId).then(r=>r.json()).then(a => {
    asset = a;
    document.getElementById('assetTitle').textContent = a.asset_tag || '报废资产';
    renderBasic(a);
    renderScrap(a);
    document.getElementById('infoCreated').textContent = a.created_at || '-';
    document.getElementById('infoScrappedAt').textContent = a.scrapped_at || '-';
    document.getElementById('restoreInfo').textContent = '报废资产编号: ' + (a.asset_tag || '');
  }).catch(() => {
    document.getElementById('assetTitle').textContent = '未找到';
    document.getElementById('basicFields').innerHTML = '<p class="text-gray-400">资产记录未找到</p>';
  });
}

function renderBasic(a) {
  const fields = [
    ['asset_tag', '资产编号'], ['type', '类型'], ['brand', '品牌'], ['model', '型号'],
    ['serial', '序列号'], ['cpu', 'CPU'], ['memory', '内存'], ['disk', '硬盘'],
    ['purchase_date', '采购日期'], ['purchase_price', '采购价格'], ['supplier', '供应商'],
    ['warranty_end', '保修到期'], ['current_user', '使用人'], ['location', '位置']
  ];
  document.getElementById('basicFields').innerHTML = fields.map(f => {
    const val = a[f[0]] || '-';
    const display = f[0] === 'purchase_price' && val !== '-' ? '¥' + parseFloat(val).toFixed(2) : val;
    return '<div><span class="text-gray-400 text-xs">'+f[1]+'</span><p class="font-medium text-sm">'+escHtml(String(display))+'</p></div>';
  }).join('');

  const nw = document.getElementById('assetNotesWrap');
  if (a.notes) {
    nw.innerHTML = '<span class="text-gray-400 text-xs">备注</span><p class="text-sm mt-1">'+escHtml(a.notes)+'</p>';
  } else {
    nw.innerHTML = '';
  }
}

function renderScrap(a) {
  const reasonLabels = {
    '损坏': '损坏', '被盗': '被盗', '淘汰': '淘汰'
  };
  const reasonDisplay = reasonLabels[a.scrap_reason] || a.scrap_reason || '-';
  document.getElementById('scrapFields').innerHTML =
    '<div><span class="text-gray-400 text-xs">报废原因</span><p class="font-medium text-sm">'+escHtml(reasonDisplay)+'</p></div>' +
    '<div><span class="text-gray-400 text-xs">报废备注</span><p class="font-medium text-sm">'+escHtml(a.scrap_notes||'-')+'</p></div>' +
    '<div><span class="text-gray-400 text-xs">操作人</span><p class="font-medium text-sm">'+escHtml(a.scrapped_by||'-')+'</p></div>';
}

function toggleRestoreReasonOther() {
  const val = document.getElementById('restoreReason').value;
  document.getElementById('restoreReasonOtherWrap').classList.toggle('hidden', val !== '其他');
}

function showRestore() {
  document.getElementById('restoreReason').value = '维修好了';
  document.getElementById('restoreReasonOther').value = '';
  document.getElementById('restoreNotes').value = '';
  document.getElementById('restoreReasonOtherWrap').classList.add('hidden');
  document.getElementById('restoreModal').classList.add('active');
}

function closeRestoreModal() {
  document.getElementById('restoreModal').classList.remove('active');
}

function doRestore() {
  let reason = document.getElementById('restoreReason').value;
  if (reason === '其他') {
    reason = document.getElementById('restoreReasonOther').value || '其他';
  }
  const notes = document.getElementById('restoreNotes').value;

  fetch('/api/scrapped/'+assetId+'/restore', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({reason: reason, notes: notes})})
  .then(r=>r.json()).then(d => {
    if (d.status === 'ok') {
      alert('资产已成功复活！');
      window.location.href = '/asset/' + (d.new_asset_id || '');
    } else { alert('操作失败: '+(d.error||'未知错误')); }
  }).catch(e => alert('操作失败: '+e));
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', loadAsset);
</script>
{{end}}
