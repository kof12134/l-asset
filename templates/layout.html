<script>
var THEMES = {
  orange: {50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12'},
  blue:   {50:'#f0f4ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}
};
function applyTheme(name) {
  var c = THEMES[name] || THEMES.orange;
  localStorage.setItem('lasset_theme', name);
  document.documentElement.setAttribute('data-theme', name);
  document.getElementById('themeIcon').textContent = name === 'orange' ? '🌙' : '☀️';
}
function toggleTheme() {
  var cur = localStorage.getItem('lasset_theme') || 'orange';
  var next = cur === 'orange' ? 'blue' : 'orange';
  applyTheme(next);
}
(function(){
  var saved = localStorage.getItem('lasset_theme') || 'orange';
  applyTheme(saved);
})();
</script>

<script>
function doLogout() {
  fetch('/api/logout', {method:'POST'}).then(() => { window.location.href = '/login'; });
}

// ── 智能粘贴核心（共用函数，index/assets 双入口） ──
function smartParse(text) {
  var result = {};
  var lowerText = text.toLowerCase();
  var brandMap = {
    'lenovo':'Lenovo','thinkpad':'Lenovo','thinkcentre':'Lenovo','thinkstation':'Lenovo','thinkbook':'Lenovo','thinkvision':'Lenovo',
    'dell':'Dell','latitude':'Dell','optiplex':'Dell','precision':'Dell','xps':'Dell','poweredge':'Dell','inspiron':'Dell','vostro':'Dell','alienware':'Dell',
    'hp':'HP','elitebook':'HP','probook':'HP','zbook':'HP','prodesk':'HP','elitedesk':'HP','pavilion':'HP','spectre':'HP','envy':'HP','omen':'HP',
    'apple':'Apple','macbook':'Apple','mac pro':'Apple','mac mini':'Apple','imac':'Apple','mac studio':'Apple','ipad':'Apple',
    'huawei':'Huawei','matebook':'Huawei','honor':'Huawei',
    'asus':'ASUS','vivobook':'ASUS','zenbook':'ASUS','rog':'ASUS','tuf':'ASUS',
    'acer':'Acer','predator':'Acer','swift':'Acer','aspire':'Acer',
    'microsoft':'Microsoft','surface':'Microsoft',
    'fujitsu':'Fujitsu','toshiba':'Toshiba','sony':'Sony','vaio':'Sony',
    'panasonic':'Panasonic','xiaomi':'Xiaomi','redmi':'Xiaomi','mi':'Xiaomi',
    'samsung':'Samsung','lg':'LG','nec':'NEC','ibm':'Lenovo','gigabyte':'Gigabyte','msi':'MSI','razer':'Razer',
    '联想':'Lenovo','戴尔':'Dell','惠普':'HP','华硕':'ASUS','华为':'Huawei','宏碁':'Acer','小米':'Xiaomi','三星':'Samsung'
  };
  for (var k in brandMap) { if (lowerText.indexOf(k) >= 0) { result.brand = brandMap[k]; break; } }
  var snPats = [/(?:sn|s\/n|serial\s*(?:no|number|#|num)?|service\s*tag|序列号|编号|sn码|出厂编号)\s*[:：]?\s*([\w\-]{5,})/i, /(?:p\/n|part\s*(?:no|number|#)|asset\s*tag|product\s*#)\s*[:：]?\s*([\w\-]{5,})/i];
  for (var i=0;i<snPats.length;i++) { var m=text.match(snPats[i]); if (m) { result.serial=m[1].trim(); break; } }
  if (!result.serial) {
    var lines=text.split(/[\n\r]+/).map(function(l){return l.trim();}).filter(function(l){return l;});
    for (var li=0;li<lines.length;li++) { var l=lines[li]; if (/^[A-Za-z0-9\-]{6,}$/.test(l) && !/^[a-z]{2,}/.test(l) && !/^(\d{4})$/.test(l)) { result.serial=l.toUpperCase(); break; } }
  }
  if (result.brand) {
    var mp = /(ThinkPad|ThinkCentre|ThinkStation|Latitude|OptiPlex|Precision|XPS|EliteBook|ProBook|ZBook|ProDesk|EliteDesk|Pavilion|MacBook Pro|MacBook Air|Mac Pro|Mac Mini|Mac Studio|MateBook|Surface\s*\w+|Inspiron|Vostro|ThinkBook|Galaxy|Spectre|Envy|ZenBook|VivoBook|ROG|Predator|Swift|Aspire)\s+([A-Za-z0-9\s\-]+?)(?=\s*(?:(?:SN|S\/N|Serial|$)|\/|,|\||\n|[A-Z]{2,}:))/i;
    var m2 = text.match(mp);
    if (m2) { result.model = m2[2].trim(); if (result.model.length > 30) result.model = result.model.slice(0,30).trim(); }
  }
  if (!result.model && result.brand === 'Dell') { var dm = text.match(/[A-Z][a-z]*[0-9]{3,4}[A-Z]?[a-z]?\b/); if (dm) result.model = dm[0]; }
  if (!result.model && result.brand === 'HP') { var hm = text.match(/G\d\b/); if (hm) result.model = hm[0]; }
  var cpuPats = [/(?:Intel\s+)?(?:Core\s+)?i[3579][-]?\d{4,5}[A-Za-z]*(?:\s+P|U|H|HK|HX|HQ|K|F)?/i, /(?:Intel\s+)?(?:Core\s+)?Ultra\s+\d{3}[A-Z]?/i, /(?:Intel\s+)?Xeon\s+[\w\s]+?\d+/i, /(?:Intel\s+)?(?:Celeron|赛扬|Pentium|奔腾)\s+N?\d+/i, /(?:AMD\s+)?(?:Ryzen|锐龙)\s+\d+\s*\d{4}[A-Z]?/i, /(?:AMD\s+)?Ryzen\s+(?:Threadripper|PRO)\s+\d+/i];
  for (var c=0;c<cpuPats.length;c++) { var cm=text.match(cpuPats[c]); if (cm) { result.cpu=cm[0].replace(/Intel\s+/i,'').replace(/Core\s+/i,'').replace(/AMD\s+/i,'').trim(); break; } }
  var memPats = [/(\d+)\s*G(?:B)?\s*(?:RAM|内存|DDR[2345]?|LPDDR[345]?|内存)\b/i, /(?:RAM|内存|DDR[2345]?|LPDDR[345]?)\s*(\d+)\s*G(?:B)?\b/i, /(\d+)\s*G(?:B)?(?:\s*[x×]\s*\d+)?\s*(?:RAM|内存)\b/i];
  for (var mi=0;mi<memPats.length;mi++) { var mm=text.match(memPats[mi]); if (mm) { var n=parseInt(mm[1]); if (n>=2&&n<=256) { result.memory=mm[1]+'GB'; break; } } }
  if (!result.memory) {
    var rawMem = text.match(/(\d+)\s*G(?:B)?(?!\s*\d+(?:GB|G|TB|T))/i);
    while (rawMem) { var n=parseInt(rawMem[1]); if ([4,8,12,16,24,32,48,64,96,128,192,256].indexOf(n)>=0) { var dnm=(result.disk||'').match(/^(\d+)/); if (!dnm||parseInt(dnm[1])!==n) { result.memory=rawMem[1]+'GB'; break; } } var rest=text.slice(rawMem.index+rawMem[0].length); rawMem=rest.match(/(\d+)\s*G(?:B)?/i); }
  }
  var diskPats = [/(\d+)\s*(?:GB|TB|G|T)\s*(SSD|HDD|NVMe|固态|机械|M\.2|PCIe|硬盘)/i, /(SSD|HDD|NVMe|固态|机械|M\.2)\s*(\d+)\s*(?:GB|TB|G|T)/i, /(\d+)\s*(?:GB|TB|G|T)(?:\s+PCIe)?(?:\s+NVMe)?(?:\s+SSD)?/i];
  for (var di=0;di<diskPats.length;di++) { var dm2=text.match(diskPats[di]); if (dm2) { var du=/tb/i.test(dm2[0])?'TB':'GB'; var dt=dm2[0].match(/SSD|HDD|NVMe|固态|机械|M\.2/i); result.disk=dm2[1]+du+(dt?' '+dt[0]:''); break; } }
  var scr = text.match(/(\d+(?:\.\d+)?)\s*(?:寸|英寸|吋|\"|inch)/i);
  if (scr) result.notes = (result.notes||'') + scr[1] + '寸';
  var osP = /Windows\s*(?:10|11|Server|7|8|8\.1|XP|Vista)\s*(?:Pro|Enterprise|Home|专业版|企业版|家庭版|工作站|Iot)?/i;
  var osM = text.match(osP);
  if (osM) result.notes = (result.notes?result.notes+' / ':'') + osM[0];
  var osM2 = text.match(/macOS|Ubuntu|Linux\s+(?:Mint|Ubuntu|Debian|Fedora|CentOS|Alpine)/gi);
  if (osM2) result.notes = (result.notes?result.notes+' / ':'') + osM2[0];
  var sc = text.match(/(京东|淘宝|天猫|拼多多|苏宁|供应商|采购渠道)\s*[:：]?\s*([^\s,，、、\n]+)/);
  if (sc) result.supplier = sc[2];
  var pp = text.match(/[¥￥]\s*(\d+(?:[.,]\d+)?)/);
  if (pp) result.purchase_price = parseFloat(pp[1].replace(',',''));
  var dp = /(\d{4})[\-\/年](\d{1,2})[\-\/月](\d{1,2})日?/;
  var dm = text.match(dp);
  if (dm) { var d=dm[1]+'-'+String(parseInt(dm[2])).padStart(2,'0')+'-'+String(parseInt(dm[3])).padStart(2,'0'); result.purchase_date=d; }
  return result;
}
</script>
